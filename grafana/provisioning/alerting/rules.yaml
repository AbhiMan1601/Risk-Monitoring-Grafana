apiVersion: 1

groups:
  - orgId: 1
    name: vault-risk-rules
    folder: DeFi Risk
    interval: 5m
    rules:
      - uid: yearn_liquidation_risk_high
        title: Yearn Liquidation Risk High
        condition: C
        data:
          - refId: A
            datasourceUid: timescaledb_uid
            relativeTimeRange:
              from: 1800
              to: 0
            model:
              format: table
              rawSql: >
                SELECT
                  EXTRACT(EPOCH FROM NOW())::bigint AS time,
                  COALESCE(AVG(liquidation_risk_24h), 0) AS value
                FROM defi_vault_metrics
                WHERE vault_slug = 'yearn-finance'
                  AND time >= NOW() - INTERVAL '30 minutes';
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params: [0.60]
                    type: gt
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: yearn-finance liquidation risk > 0.60
        labels:
          severity: warning
